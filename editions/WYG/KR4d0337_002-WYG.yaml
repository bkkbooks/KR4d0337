body:
  text: 滄浪集卷二宋嚴羽撰五言絶句西陵望西陵終日望不見有歸橈欲去猶回首寒江起暮潮閨怨昨夜中秋月含愁顧影頻空留可憐影不見可憐人又欲作遼陽夢愁多自不成錯嫌烏臼鳥半夜隔窗鳴舟中示同志見說春帆外康廬水石多期君一把臂長嘯入煙蘿塞下絶句莫被封侯誤封侯似漢家君㸔城下骨萬古一黄沙七言絶句送友人之楚州黯黯離筵夕照収江城羗􅅇起邊愁念君此去三千里何處關山是楚州酬故人見贈湘江南去少人行瘴雨蠻煙白草生誰念梁園舊詞客桄榔樹下獨聞鸎羽林郎貂㡌狐裘塞北妝黄鬚年少羽林郎彎弓不怕天山雪生縛名王入建章閨中詞良人西去闕妾在閨中對影居萬里長㸔天外月一生空得夢中書塞下曲六首孤城莽莽秋天外盡日無雲空自哀忽怪一時天盡黒合群寒雁向西來𣺌渺塵沙散槖駞風吹黄葉渡黄河羗人半醉葡萄熟塞馬初肥苜蓿多古戍秋生畫角哀思歸泣盡望鄉䑓邉闗日落寒風起但見黄沙萬里來一身逺客逐戎旌落日蕭條望古城漸近磧西無水草北風沙起槖駞驚玉關西去更無春滿眼蓬蒿起塞塵漢馬不歸青海月悲笳愁殺隴頭人天山一夜雪漫漫虜去營空戰血乾十萬征人回馬首天邊烽火報平安江上送客留君夜飲北風寒且折梅花耐醉歡明日桐廬潮去逺孤帆天際若為㸔頼成之還自江西感舊有作十年心事兩蹉跎南北東西别恨多今日樽前重把手相㸔争奈白頭何聞􅅇江上誰家吹􅅇聲月明霜白不堪聽孤舟萬里瀟湘客一夜歸心滿洞庭舟中指落星寺日暮黄沙壓岸平江心風浪暗㝠㝠南康一望何由到愁殺舟中指落星答李友山山中留别已恨青山臨渡口相思回首隔夫君更堪重到相思處不見青山見白雲秋日西風催我轉繩床坐落秋山午夢凉蟬老樹深音響别滿天風雨帶斜陽新凉小院新凉水竹通鳴蟬聲斷晩來風忽然坐睡瞢騰去不覺殘書落手中臨池乍凉池館雨初収菱角蓮房共趂秋獨恨碧波渾占却更無剰水浴沙鷗北風夜來雨雪北風顛吹得波濤欲暗天世上如今少知已煩君牢繫釣魚船燕此篇或云三體作巢破春雛半不存啣泥空傍主人門一生巧計輸黄雀飲啄官倉長子孫吴中送友歸豫章川程極目渺空波送爾歸舟奈别何南國音書須早寄江湖春雁已無多臨川送周月舡入京别時把酒已魂消别後音書恐閴寥一片離心寄春水隨君船入浙江潮五言八句别客客鬂風霜晚離亭皷角聞念君當此去把袂不能分衡霍連秋氣瀟湘合暮雲愁心将落葉向晩共紛紛送張季逺入京手把一枝菊贈君千里行山川遥滿日何處是吳京飲罷北風起蕭蕭寒雁聲東流倘未盡見我望君情訪益上人蘭若獨尋青蓮宇行過白沙灘一逕入松雪数峰生暮寒山僧喜客至林閤借人㸔吟罷拂衣去鐘聲雲外殘從軍行二首朔風嘶馬動遥想雁門秋負劍辭鄉邑彎弓赴國讐黄榆連白草河隴去悠悠報主男兒事焉論萬戸侯又翩翩䨇白馬結束向幽燕借問誰家子邯鄲俠少年彎弓隨漢月拂劍倚蠻天說與單于道今秋莫近邊出塞行將軍救朔邊都䕶上祁連六郡飛傳檄三河聚控弦連營當太白吹角動長天何日匈奴逺中原得晏然關山月今夜關山月偏能照馬鞍盧龍征戍客圓缺㡬回㸔遥想金閨裏應悲玉露寒黄沙三萬里何處是長安蜀女怨幾時離月峽五見紫蘭凋塞雁隨魂㫁江花逐淚飄沙頭南北客京口去來潮日日無消息空登萬里橋尋寗山人所居幽人以道隠結茅岩之東余亦避世客逢君於此中鳥因留食至泉為煉丹紅向晩下山去月髙秋色空江樓夜月懐故山友人陳聘君吳樗卿昨夜江樓月思君好㫁腸猿聲相應發山色更青蒼楚塞來書逺閩關隔夢長今朝㸔愁髩為爾半成霜江上有懐上官長史懐君長不樂立馬大江邊塞鴈來無際驚沙度颯然客心懸日夜書札㫁雲天莫作青山老空為人所憐聞鴈逺客驚秋雁髙樓復異鄉聲兼邊哨苦影落楚雲長此夜頭堪白他山葉又黄年年洞庭浪飄泊更無行送上官偉長歲晩長愁緒嗟君更逺行兵戈今日淚江海故人情此别㡬時見寒猿一夜鳴致君相許在回首壮心驚有懐閬風山人把酒忽惆悵君今吳楚間孤雲隨馬首風雨隔河關心事竟安在此行殊未還空将百年意泣向寳刀環避亂途中回首兵戈地遺黎見㡬人他鄉空白髪故國又青春多難堪長客偷生愧此身本無匡濟畧嘆息謾傷神将往豫章留别張少尹父子西江飛鳥外極目渺離愁同侶時催發征人不可留江湖䨇淚眼天地一孤舟揮棹從兹别空傷旅鬂秋懐南昌舊逰昨在南昌府清逰不可窮杯行江色裡棹進月明中樓􅅇吹晴雪菱歌漾晚風坐來懐舊迹萬里一飄蓬寄山中同志我有三足麂放之在碧山别來幾千日昨夢忽來還松色入天盡岩花落地閒慿君一問信沿月上潺湲望西山西山横翠新中隠石仙真笑取玉麈尾揖兹丹霞人雲從石洞出月落滄江瀕予亦将髙卧藤蘿掛葛巾秋夜臨汝舘懐友人陳聘君頼竹莊秋聲動梧竹月色滿庭蕪此夕懐良友天涯各一隅飛飛群過雁切切未栖烏安得從君去扁舟駕五湖樟樹鎮醉後題吾憐樟樹好取醉欲無還酒壓鵝兒色詞歌雉子斑朱樓當碧水紅日下青山興罷揚鞭去蒼蒼煙霧間張奕見訪逆旅歲晩傷為旅君來適慰情郊扉寒少色江渚夜多聲報國憐他日為儒愧此生那言離合際更觸壯心驚豫章城愛此城髙處回鞭醉毎醒江花兩岸白煙樹一行青雲學山舒態天隨水賦形吾多徐孺子獨向此沉㝠江行暝色蒹葭外蒼茫旅眺情殘雲和雁㫁新月帶潮生天到水中盡舟隨樹杪行離家今幾宿厭聽棹歌聲舟中苦熱舟行何太熱㟁上莽塵沙閃閃浪頻過昏昏日又斜年衰愁作客秋近苦思家蝗旱三千里江淮兒女嗟江上泊舟天際長愁客沙邊舊驛亭風低江浦鴈雪暗夜舡燈窮老嗟身拙狂歌畏酒醒此生何定著江漢一浮萍逢戴式之往南方此老相逢日中原正用兵黄塵空北望白首更南征今古悲秋意江湖惜别情幾時群盜滅匹馬㑹神京塞下鞍馬連年出關河萬里賖将軍思報國壯士耻還家大漠春無草天山雪作花誰憐李都尉白首没黄沙吳江春望客有東南别慿髙正憶家青春江上草湖日岸頭沙去鳥無邊盡歸帆幾處斜音徽不可問惆悵結瑶華閒居寄友蕭條遺世心江上坐來深擁褐閒窺沼思山欲借琴有幡煙際寺無葉水邊林不見同袍友慿誰伴苦吟遇周子陵自行在還言石屏消息不見石屏老相思問客舡長沙聞近别行在定虚傳兵革來書㫁江湖望眼穿他時同話此把臂喜應顛喜友人相訪擬韋蘇州作朝朝竹林院閉戸讀殘書几閣晨風入江郊寒露餘故人歩屧至清坐毎躊蹰輟卷還留興潄泉同飯􅂼有感六首誤喜干戈息那知患更長黄雲新戰路白骨舊沙場巴蜀連年哭江淮幾郡瘡襄陽根本地回首一悲傷二哀痛天災日絲綸罪已深王師曽北伐牧馬尚南侵謀國知誰計和親豈聖心願聞修實德聽納諌臣箴三聞道單于使年來入國頻聖朝思息戰異域請和親今日唐虞際群公社稷臣不妨盟墨詐須戒覆車新四災異時時見群情恐懼中修攘今日急反側向來同社稷堪多難安危係数公殘生江海去老作一漁翁五陛下春秋盛謙卑毎責躬得無勞聖慮猶未定儲宮付託關神器乾坤在至公早聞宣詔册歡喜萬方同六傳聞降北将猶未悔狂圖忍召豺狼入甘先矢石驅聖朝何負汝天意必殱渠試㸔山東冦如今更有無三衢邂逅周月舡論心數日臨分賦此二首同是江湖客居然歲月多心期㸔白􅄠歸夢付滄波子去見家逺吾衰奈别何幾時江上月載酒定相過又戎馬相逢日那知復此間客愁詩莫遣世事酒相關江上孤舟在天隅兩鬂斑更将憂國淚滿䄂送君還秋日廬陵送杜子野攝鍾陵糾掾暫見還分手誰能不黯然去㠶蘆葉浦别酒菊花天他日思良㑹空囊檢贈篇鍾陵有過鴈莫忘尺書傳七言八句臨川逢鄭遐之雲夢天涯十載無窮恨老淚燈前語罷垂明發又為千里别相思應盡一生期洞庭波浪帆開晩雲夢蒹葭鳥去遲世亂音書到何日關河一望不勝悲再送頼成之出都天際晴霞欲變春髙樓分手淚沾巾荆吳渺渺孤舟逺江海悠悠白髪新萬事蹉跎堪更問十年離别亦何頻江村幾處梅花發明日相思是旅人将至潯陽途中寄諸從昆弟𣺌渺孤帆去幾程悠悠天際望湓城一身避亂辭鄉國千里相思隔弟兄猿呌匡廬寒暮色雁過彭蠡帶秋聲江湖此去多飄泊腸㫁風塵逺别情紫霞樓夜飲西樓孤絶倚天青我愛眀河對户横露滿碧梧風屡起煙消緑嶠月初生仙人共酌丹霞酒逸侶同吹白玉笙不向此時窮笑傲更從何處豁髙情客中别表叔吳季髙悠悠逺别半生悲白日相逢又話離海内風塵驚不定天邊消息到何時洞庭旅鴈春歸盡𤓰歩寒潮夜落遲惆悵孤舟從此去江湖未敢定前期和上官偉長蕪城晩眺平蕪古堞暮蕭條歸思慿髙黯未消京口寒煙鴉外滅歴陽秋色雁邊遥晴江水落長疑雨暗浦風生欲上潮惆悵此時頻極目江南江北路迢迢寄郭招甫時在潯陽夢向三江買釣船掛帆西去白雲邊窗開曉色香爐見門落寒聲瀑布懸百年酒興陶彭澤四海詩名孟浩然何日真尋塵外跡焚香酌茗話先賢登滕王閣髙閣慿空浩蕩開當時遺跡幾荒苔煙含晩市悠悠見沙帶澄潭渺渺囬此日登臨分壯氣百年淪落憶雄材可憐萬古神交意日暮荒凉一嘆哀早春寄潜齋王史君昏昏醉睡慵朝起日日柴門待煖開春至任從花鳥笑客來須仗酒尊陪移舟動覺依江栁策杖時能訪早梅忽憶使君聨騎去此時乗興且銜杯送崔九過丹陽郡上荆門省親江國歸心一鴈牽河橋分手數盃傳千崖萬壑秋聲裏匹馬孤帆落照邊牛渚寒波翻極浦荆門晩樹合遥天他時莫枉瑶華問南北相思各𣺌然舟中寄漢陽故人浦口停留待信風邊城落日亂流通梧桐院落秋聲裡橘柚人家晩照中棹歌幾處驚寒切砧響千村入耳同日日愁心西北望漢陽楓樹落無窮夜泊夜聞估客送将歸葭菼蕭條月色㣲萬里江湖何處極孤舟鴻鴈自相依盃抛黄菊乾賖酒城掩清砧罷搗衣不奈此時心㫁絶長沙南去故人稀送吳儀甫之合淝謁杜師十年劍氣欲凌雲况復才華逈不群投筆幾囬思出塞賦詩此日去從軍沙場青草時差緩淝水紅旗㨗屡聞玉帳元戎桑梓舊行㸔幙府策竒勳楚江晩思旅思遥遥倦向南誰家煙火起晴嵐孤城歸鳥連寒角極浦斜陽帶逺帆楓葉自能悲楚客竹枝何用怨江潭今朝欲冩風波恨千里書成手自緘古詩送趙立道赴闕仍試春官即事感興因成五十韻案此係排律雜入嗣聖中天日遺氓憶漢時一王新盛禮萬國賀重熈官爵沾寰宇光明冠本支窮冬辭老母吉日赴京師祖席明斜照寒江結暮澌停杯愁把袂立馬語臨岐草動春前色梅繁雪後枝湖山饒逸興士友重逰嬉菱唱工迷客荷舟穏放維土風珍縞帶吳饌熟蓴絲塔寺開金碧樓䑓􅃞淼瀰雲連勾踐國江動伍員祠閶闔春朝早觚棱霽景遲栁迎仙仗軟花簇御楼欹苜蓿來宛馬櫻桃薦寝帷周家千歲歴漢殿萬年巵駐蹕山川逺櫜弓歲月移天俄憂杞國日再仰咸池弓劍群臣淚園陵故國悲乾坤開帝統雨露豁宸私蜂蠆何為爾豺狼欲問誰箭流元帥幙城立叛營旗國體存矜䘏皇猷務逺綏且從鷹一飽自待虎䨇疲復說西京亂愁連蜀道危倉黄分隊伍指㸃䕶藩籬狙詐終勞馭逰魂不足覊幾年腥戰血今日痛瘡痍宗社神靈在邦家德澤遺㑹聞淝水㨗可復雁門踦草詔詞頭切蒲輪禮意卑賢良多選㧞社稷在扶持舉動新群目經綸佇一䕫長沙何遽往鄭北竟堪疑莫以朝廷重翻令盜竊窺稍懲鷹隼擊庶使鳳凰儀薪膽方無倦輿圖正入披王孫思報國天府待忠詞世道多為忌波流幸勿隨從容陳古昔感慨論邊陲仕進雖云始平生見在兹青氊今可復綵服更相宜漂泊㣲軀老蹉跎困翮垂黻材元自逸正論竟焉禆誤賞騷人作深慚國士知呌閽時已晩鳴劍志空馳欝欝驅流俗悠悠嘆亂離羊裘終隠去漁釣復何之出處從今隔飛騰不可追濟時須俊傑願覩中興期庚寅紀亂承平盜賊起喪亂降自天荼毒恣兩道兵戈浩相纒此邦禍最酷賤子忍具言朝廷討亂初誰任主將權輜重道間來隠隠何闐闐殿前盡貔虎所向當無堅組練照川明戈㦸耀日鮮父老當時言此賊不容吞軍興法律在進退非得專奈何忽捨去屯壘隨之遷留兵不五百當賊逾数千英英猛將來策馬獨奮先出入突且擊勢絶飄風旋殺賊不知数屍骸相疊穿誰謂散復來其徒奈實繁須臾塞城郭沓水迷妖氛将軍怒一呼誓死報國恩拔劍復入陣皷聲俄不聞哀哉失壯士白日為之昏嗟彼城中人欲生何由縁連頸受屠戮赤族罹禍寃妻妾悉驅廹道路號相牽或有小失意性命無由全言語方出口腰領已不連婉婉閨中女未嘗窺户邊白刃斥之去不許暫稽延囬頭顧父母父母安敢憐所掠靡孑遺嚢擔無虚肩衣冠困奴隷怒罵仍笞鞭又有脫鋒刃多化為魚黿途窮勢復廹忽若忘重淵倉卒所傳誤投身空棄捐嬰兒或在抱粉黛猶儼然沙磧腥人腸㗸啄集烏鳶嗚呼彼蒼天念此何罪愆比者因亂定南歸經舊㕓豈徒人民非莫辯陌與阡所見但荆棘狐狸對我蹲坡陀流血地靡靡生寒煙城頭遇老翁行淚與余論云賊破城時賊初攻南門大軍血戰久家得扶我奔所免有萬計皆我明君恩不然盡魚肉遺黎何有焉語罷復嗚咽余亦涕泗漣軍旅苦轉輸飢饉仍荐臻瘡痍苦未復千里惟空村白骨不知誰無人為招魂四郊實多此仁者宜惻然近喜大告㨗所俘悉已還兇渠戮廟社黨類歸之田當知釜中魚貸爾喘息懸胡為迭恃險髙疊猶山顛蠻獠本異性土風來有年力屈勢暫服乞降非惡悛脅從固罔治群醜豈盡原反復恐難料安危仗諸賢此師不再舉乗時須勉旃國家刑罰在廟筭必不偏感時鬚髪白憂國空拳拳贈呂仲祥雪中誦招隠髙卧閒琴尊忽有呂夫子清晨扣我門夫子忠烈後家聲四海聞神交三十載方此挹清芬吾道識宗主文章詔討論期我名山逰招我出塵紛伊余抱病久局促滯中園平生海嶽交零落今誰存今日對夫子使我開心魂忽覺此身去萬里如空雲已見赤城霞疑聞天姥猿世道久崩廹誰将元化分濛濛六合間莽莽塵沙昏所以賢逹士甘将麋鹿群終欲從夫子超然凌紫氛松間兩白鶴爾實聞斯言登豫章城憂來不自得登城望髙天寒雲四面起朔氣下長川脫劍且却坐君知心惘然奈何平生志欝抑江湖間凛凛秋風來茫茫落日晩長憂生白髪沉想忘朝飯向來經濟士本是碌碌人蕭曹刀筆吏樊灌屠販臣徒歩取勳業漢道為光新我今何為者飄飄去鄉國狂歌豫章城醉卧風江碧但取英雄笑終慙倜儻生名當以德載事恥因人成獨酌還獨酌哀歌還寂寞安得凌風翰為君拂寥邈夢中作予客廬陵日夢至一大府主人自稱劉荆州與予觴咏各賦詩為樂覺而彷彿其一二因續成之少小尚竒節無意縛珪組逺逰江湖間登髙屢懐古前朝英雄事約略皆可覩将軍策單馬談笑有荆楚髙視蔑袁曹氣已盖寰宇天未豁壯圖人空坐崩沮丈夫生一世成敗固有主要非儓𨽻人未死名已腐夫何千載後亦忝趍大府主人愛敬客開宴臨長浦髙論極興亡歴覧窮川渚殷勤芳草贈窈窕邯鄲舞愧無登樓作一旦濫推許懐哉揮此觴别路如風雨劉荆州答皇漢失中德四海横雕戈驚塵暗九有豺虎臨長河流人滿川谷積屍亂如麻闗洛既蕩析楚襄空嵯峨謬當牧守寄無以救時訛竟貽百代誚家世隨蹉跎安知千載下夫子感慨多人生固有志成敗飄風過且復登城隅逍遥望山河日暮襄漢碧鳬鴨浮輕波何以􅇺我心𤣥熊間黄駞清觴宜城酒二八邯鄲歌願言冩懐抱聊用寛吾家勿言此歡久樂罷歸無何廬陵客舘雨霽登樓言懐寄友終日坐汾淟邈然無少欣登樓一周覧始見萬山群微雨洗殘暑青天捲浮雲襟懐兩廓落朗若見夫君見君君何在顧影還獨笑吏非金門逰隠異滄洲調江明秋月白山空夜猿嘯徒事百卷文未返一竿釣留滯豈勝愁非君誰與謀水寒終赴海鴈逺暫賔秋舉世不可語猶當傲巢由贈君三尺劍永駕五湖舟送嚴次山四年棲嶺表三歲客海東人生貴安適奔走成何功去年喜歸來山花春䝉茸弟姪各捧觴一笑生華風南山多紫芝北山多白薇雲空汗漫臺月午生凉輝俯仰僅一歲脂車復征西豈以丈夫志萬里猶庭闈豈以名山川待公親品題故園松桂林一一含貞姿何時賦歸來毋令久凝思豫章留别諸公登樓眺海日沙島聽江猿何意豫章國還着孤蓬根經過徐孺宅出入洪喬門昔㸔秋葉落今見荷葉繁頗躭山水趣正惬朋從温窮秋催客去孤帆若雲奔追攀感數子灑襟餘淚痕既傷嵗月晩復戀煙霞樽歡樂無定序聚散同朝昏丈夫志四海别離何足論逰臨江慧力寺舟中望古刹川上移琴樽隠隠林閣見迢迢鐘梵聞列岫不離席驚濤常在門風帆與沙鳥汎汎隨朝昏天髙一幡掛室静衆香焚煙起多近郭鴉歸無逺村松際尚㣲雪經年來暮猿賞惟静者契法對髙僧論安得息塵駕永懐瞻獨園明朝别此去惆悵滿松雲山居即事稍欣入林深已覺煩慮屏霜果垂秋山歸禽度嵐嶺紛紛葉易積漠漠雲欲盛澗底寂無人松蘿窅然瞑惟聞山鳥啼月上柴門静終歲寡持醪延歡聊煑苕群書北窗下帙亂誰能整逰仙六首秋澗夜瑟瑟月露明團團褰衣歩澗月忽見䨇飛鸞上有騰空仙天風飄珮環清歌映巗谷粲若玉煉顔願言縁雲去隨君向仙闗嚥食長不老何用思人間二憶讀玲瓏篇來往虚皇閣空見白芙蓉秋風幾凋落昨逢紫陽君共有丹䑓約下視塵埃中冠纓縛猿玃世事行若此悠悠復何託三五老出東南崔嵬相間隔清晨登絶頂處處仙人跡朱霞散九光巖谷好顔色回首空澄湖黄濤正喧擊石上弦素琴神歡心自清仙童三四人忽來左右聽嘹嘹誦金章勸我餐瑶瓊贈我一玉麈邀我凌雲行舍琴與之去恍惚在蓬瀛四朝别簡寂觀夜行石徑溪溪光照厓緑月色正相宜石上三道士頎然好丰姿或弄金光草或把珊瑚枝慿風招素手賜我一玉巵嘆我事逺逰蕭颯朱顔衰長林孤月落羽盖何葳蕤垂垂乘之去棄我忽若遺明發閴無覩但有青鼯啼五翩翩南來雲如飛百隻鶴我行忽見之眇然意欣樂五峰何峻秀靈草生根蕚願乗此雲去去鍊黄金藥千載倘歸來不復見城郭六瀑布似明月上有石梁横矯首望東海正見蟾蜍生揚輝天漢間下照蓬丘城桂實幾凋落姮娥空聞名咄哉玉斧子不如白兎精靈藥不服食執柯獨何成迢迢綵雲外誰吹白玉笙竦身一長聽了若出寰瀛我友逺言邁朔風卷秋樹白日寒無光是時鴻鴈來四野何蒼茫我友逺言邁使我結中腸如何携手歡一旦成異鄉行旅有期程逰子多悲傷置酒欲髙歌淚來沾我裳四座慘相顧征馬亦徬徨未知㑹面日且復盡兹觴悠悠我行邁悠悠我行邁邈在天一方道路無終極時節異炎凉路逢故里親揮泣問我鄉妻子離别久不知今存亡中原多白骨城邑聚豺狼逺去無僮僕思還絶餱糧寄語家中人逺行良可傷朝日臨髙䑓朝日臨髙䑓睠彼芳樹間上有共棲鳥和鳴何關關爾乃慕儔侶我胡獨不然良友在萬里邈然河與山聚㑹豈不思歲月倐已殚未必無他人要非心所歡昔逰東海上昔逰東海上道遇青童君授我度世訣中皆鳥篆文讀之了不解再拜問㣲言舉首忽無見茫茫空白雲秋風入我戶秋風入我户翩翩動床帷咄唶中夜起奈何我心悲四海豈不大傷哉無已知過逍遥山來過許仙宅復窺洪厓井地逐靈勝髙興接煙霞永伊余坐昏墊久欲還林嶺明發囊丹砂歸歟煉頺景聞鴈二首凄離聽不足咿嗈斷還續江人何似情估客舟中宿夜深砂磧寒月冷洞庭寛寂寞相依影悲風動毳翰又江南底好處塞北今衰草何恨旅情遥月映蘆花老琵琶倚蓬窗孀婦别洞房十載江湖淚一夕盡淋浪古懊儂歌六首五两轉須臾相望奈何許寄語黄㡌郎船頭幔摇櫓二君子如白日願得垂末光妾身如螢火安能久照郎三郎去無見期妾死那瞑目郎歸認妾墳應有相思木四舡在下江口逆風不得上結束作男兒與郎牽百丈五朝亦出門啼暮亦出門啼蛛網掛風裡遥思無定時六懊惱復懊惱懊惱無奈何請郎且少住聽妾懊惱歌滄浪集卷二
