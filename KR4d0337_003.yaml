body:
  text: 滄浪集卷三宋嚴羽撰楚詞憫時命憫時命之不當兮去重華之日逺懐貞慤之操行兮遭此世之淟涊志浩蕩以耿介兮思低回而蹇産衆日進而蔽壅兮何靈修之為怨因時俗之俇儴兮背矩矱而不可化獨好脩以増姱兮宜反謂余以多詐惟天地之不可正兮指黄泉以為期欲余屈心以從俗兮雖九死其猶不忍為執太原之擾兮蹈焦原之峻世沈淖而莫予知兮吾愈嶢嶢而自信昔伯陽之逢紛兮時亦去其遑遑繄周公之不復夢兮曷疑尼父之惋傷隂與陽其轇轕兮天與地其囬薄八柱将撓兮四極安託嗟余生之多艱兮哀衆命之将落願披志以抽慿兮思自近而不可得獨抑悒而無誰語兮怊茫洋而焉極涕淫溢而澒溶兮向髙穹而嘆息吾将遯俗以潔居兮從巢父于箕山采三秀以咽蒼栢兮聊以終吾之永年哀山谷之多風兮霰雪㝠㝠而不見天豺狼縱目以相嘷兮虎豹群而食人信自適而無所兮蹇淹留而戃怳目眐眐而外浮兮精專專而獨往搴太清以為珮兮檻灝氣以為桂芳颯遝而並御兮豈獨椒桂與江蘺厭此世之多囂兮時逺眺而去之揭太乙之長竿兮建招摇之飛旗天吳為余奔走兮龍伯為余指麾折鄧林以為策兮眇八合而驅馳左𥚑拂乎崑崙兮右袂掩乎月窟訪混沌之所止兮趍清㝠而歴荒忽撫盤古之頂兮挽天皇之臂叙予心而敶詞兮曷為乎鴻荒之不再世吾将揭北斗而量九州兮均人命之所與定日月之所舍兮使長照臨此下土又恐群靈之好讒兮俾上帝之慿怒不照余之精誠兮吾将安愬臨天路而徬徨魂廷廷兮失度亂曰邅余車以來歸兮曽何足以舒憂羗靈脩之不吾祐兮於今之人其何尤懐余情而終古兮聊與化而逍遥操雲山操為吳子才賦山巃嵸兮白雲雲㝠㝠兮髙山若有人兮居其間超逍遥兮盤桓芸櫨兮菌桷羅橘柚兮為堂塗予室兮楓香擥葛藟兮為帷䖀蕶雜兮佩幃穹岫兮𤣥厓瀑流兮相豗皎積雪兮奔雷攅林杳其蔽日兮掛飛猱之清哀雲中之君兮白鹿山靈繽兮下空谷風蕭蕭兮灌木雲山兮幽幽羗躑躅兮夷猶惆悵兮予懐非夫君兮誰思投余簪兮太息從夫君兮歸來塗山操天蒼蒼河水黄河流泱泱大野茫茫伯鯀治水九年無功四海赤子化為魚龍鯀殛死堯震怒乃命禹平水土水土平禹功成魑魅奔走人安寧平地栽桑麻山頭種蕎麥赤驥騰櫪黄牛上軛諸侯㑹同三千國嗟爾防風後至奚為悠悠塗山今昔所悲吟行子吟行子在江海飄飄無固踪有如芒碭野朔風捲飛蓬朔風無休期飛蓬日千里散落天地間寕有復歸理寒雁西北來一呌三徘徊何時别沙漠昨夜宿陽䑓同群一相失羽翮常低摧人物有殊性奈何罹此哀昨夜客逰初結交重豪邁髙冠湛盧劍志若輕四海白首悔前圖蹉跎天一隅寒冬劍門道失路空踟蹰深林聚豺虎絶壁號猩鼯雪深車軸折征馬驚啼呼何當返故處飡黍居田廬淚下不能去腸轉如轆轤還山吟留别城南諸公日暮望南山悵然歸思發如何山中客屡㸔城頭月城頭月照女蘿秋石磴潺湲㵼碧流巖猿久别應惆悵澗鳥相呼亦共愁城南故人與我好令我忘却歸山道昨夜西窗夢到家忽驚千嶂芝花老朝來舟子促辭君囬首空江語尚聞别後莫嗟難見面相思只望嶺頭雲孺子䑓吟去年醉與東湖别欲上衡湘泛秋月君家留我却邅廽悵望還成阻脩闊西山縹緲翠屏開復憶滕王倒玉杯經過始識洪厓井調笑重登孺子䑓䑓前呼酒折荷花水净煙明散落霞舉杯失笑君何在望㫁行雲空咄嗟故人别後還愁緒此都不是余留處興來目送海邊鴻歸心掛在閩溪樹路逢估客有情人因得題詩一寄君大鵬正展圖南翼空有相思隔海雲引思歸引海上之草緑芊芊洞門一閉今幾年仙驥去時留紫鞭掛壁見之心惘然欲歸即歸亦由我不待功成何不可堯舜不能屈由巢自餘王侯何足交武陵春水緑堪染就中亦有桑麻郊近聞秦人笑相語待我東溪種碧桃謡夢逰廬山謡示同志昨夜月落西窗隂倦推石枕凭素琴身居紅塵不自覺夢入廬山深復深廬山深處在何許五老仙人邀我語眉如秀雪顔桃花酌酒相酣坐箕踞明河九𣲖倒西來石梁巉絶古道開五公握手向我笑下見刼火揚塵灰獨騎一鹿窮縈廽窅然醉踏青錦苔松風號嘈何清哀湍飛瀑捲萬壑雷忽然驚起迷所向四座已失黄崔嵬披衣徬徨還太息我與世途何所屑亂世茫茫飛蠓蠛袖中别有金膏訣須君之行當何時共向丹厓踏松雪歌錢塘潮歌送吳子才赴禮部海潮之來自古昔天下詭觀稱錢塘東南士氣實在此勢與造化為低昻觀其映日始一線何處群鷺紛然翔漸聞皷聲震原野疑是三軍囂陣行銀城天際忽過眼捲蹵厚地何倉皇餘波已去灑月窟怒氣猶自吹扶桑百川倒流浩呼洶天吳河伯神皆竦海上長人出水驚巨鰲辟易三山動廣陵之濤安可比吳客雄誇徒為爾請君㸔此凭江樓載酒無勞棹小舟湖上百花春蕩目笙歌聒我非清逰洪濤萬里壯可吞筆底颯颯洪濤奔願持忠憤愬明主一第於君何足論錢塘日邊雲氣多君之行兮莫蹉跎教人臨岐奈别何贈君錢塘海潮歌送戴式之歸天台歌吾聞天台華頂連石橋石橋巉絶横煙霄下有滄溟萬折之洪濤上有赤城千丈之霞標峰懸磴斷杳莫測中有石屏古仙客吟窺混沌愁天公醉飲扶桑泣龍伯適來何事逰人間飄颻八極尋名山三花樹下一相見笑我蕭颯風沙顔手持玉杯酌我酒付我新詩五百首共結天邊汗漫逰重論方外雲霞友海内詩名今数誰群賢翕㳫争相推胸襟浩蕩氣蕭爽豁如洞庭笠澤月寒空萬里雲開時人生聚散何超忽愁折瑶華贈君别君騎白鹿歸仙山我亦扁舟向吳越明日慿髙一望君江花滿眼愁氛氲天長地濶不可見空有相思寄海雲雷斧歌窮崖之上層峰之巔神光夜半光燭天山僧夢裡忽驚起有物墮地聲填然峰頭巨石似開劈鬼物散走如颷旋山僧曉見不敢取有客識之為雷斧持歸摩挲色蒼古匣中往往出雲氣窗外時時起風雨吾聞隂陽之氣相搏為雷霆變化翕歘常杳㝠非若革鼉考撃之為聲不知此斧何從形乃是比干之心朱雲之舌一片忠憤氣蟠欝天地間千載長不滅造化為爐巧鎔結嗟哉指佞之草不復生群奸睚眦紛縱横大弓寳玉爭竊取豈懼鬼責并天刑我欲乘雲朝帝所大呌天關排九虎乞將此斧借小臣叩頭問天天更許行劍歌行贈吳㑹卿劍歌行借君劍為君舞自古英雄重結交樽酒相逢氣相許愛君倜儻不可覊與君一見心無疑疎眉大顙長七尺神采照耀仍虬髭雄詞落紙走山嶽霹靂繞壁蛟龍隨如何十載困覊旅此心獨未時人知去年從君殺彊敵舉鞭直解揚州圍論功不及驃騎幙失路羞逐邊城兒歸來寳刀掛空壁白光夜夜驚虹霓椎牛釃酒且髙㑹酣歌擊筑焉能悲百年快意當若此迂儒拳局徒爾為我亦摧藏江海客重氣輕生然唯諾放歌行進賢之冠兮髙乎岌危山𤣥之佩兮長乎陸離茍非其道兮曷如蕙帶而荷衣堯舜邈其不逢兮我之心其孰得而知寧輕世肆志兮採商山之芝與其突梯滑稽有口如飴據髙位而自若釣厚禄而無疑則余有蹈東海而死耳誠非吾之所忍為相逢行贈馮熈之馮夫子神仙中人乃如此幾載長懐玉樹枝向來曽見蛟龍字志合神凝盃酒間誰知豁盡平生事與君髙㑹日揮金撃劍談𤣥復弄琴㸔君自是青雲器何事常懸滄海心我今與君真莫逆世上悠悠誰復識百年飄忽或須臾萬里青雲一飛翼且將耕釣任吾身君亦牀頭有周易馮夫子我欲勸君飲君當為我歌眼前萬事莫可理紛紛黄葉掃更多長風吹天送落日秋江日夜揚洪波只今留君不盡醉别後相思知奈何送吳㑹卿再往淮南故人身披紫綺裘腰佩寳玦騎驊騮英風俠氣横四海辭我逺向淮南逰淮南桂樹應猶在八公舉手遥相待明月髙懸五兩頭隨君千里過淮流十年鞍馬邊城道又見邊城見春草春草萋萋路入秦長安北望空愁人荆楚竒材多劍客感慨相逢思報國男兒事業早致身青鬢須防霜雪廹我向人間久拂衣白雲相伴掩巗扉調琴皷罷清商曲愁見孤鴻天際飛促刺行促刺復促刺男兒蹭蹬真可惜三年走南復走北歲暮歸來空四壁鄰翁為我長嘆息人生四十未為老我已白頭色枯槁海内伶俜獨一身裘馬摧藏愁欲倒今日飲君數盃酒座間頗覺顔色好忽憶當年快意時與君笑傲長相期大杯倒甕作牛飲脫巾袒跣惟嫌遲即今多病筋力弱壯心雖存興寂寞君不見昨夜誰為烈士歌聽罷仰空淚零落古劍行我有三尺劍懸膽光陸離刜鐘不錚切玉如泥水斷蛟龍陸剸犀三軍白首纔一揮惜哉掛壁無所施使之補履不如錐吾將抱憤愬玉帝手持此劍上天飛北伐行王師北伐何倉卒六郡丁男亳州骨空見朝陵奉使囬群盜翻來舊京闕襄陽兵馬天下雄尚書兄弟才傑同偏禆入救嗟已晚萬國此恨何時終四方行四方群盜苦未平况聞中原多甲兵百年讐恥幸已雪何意復失東西京嗚呼機事難適至成敗君㸔豈天意戰骨連營漫不歸空流烈士中宵淚上留田天地一何長乆上留田人老一去無歸上留田松栢一何纍纍上留田勸君酒尊金罍上留田願君大家蠶桑上留田有絲織作衲襠上留田無為多憂重煩傷上留田估客樂荆州人來販榖下江易上江難船頭打皷波漫漫長帆挽上五兩竿詞滿江紅送廖叔仁赴闕日近觚稜秋漸滿蓬萊雙闕正錢塘江上潮頭如雪把酒送君天上去瓊琚玉珮鵷鴻列丈夫児富貴等浮雲㸔名節天下事吾能說今老矣空凝絶對西風慷慨唾壺歌缺不灑世間児女淚難堪親友中年别問相思他日鏡中㸔蕭蕭髪沁園春為董叔宏賦溪莊問訊溪莊景如之何吾為平章自月湖不見江山零落驪塘去後煙月凄凉有老生如梅峰者健筆縱横為發揚還添得石屏詩句一叚風光主人雅興徜徉毎攜客臨流泛羽觴想歸來松菊重煩管領同盟鷗鷺未許相忘我道其間如斯人物只合盛之白玉堂須還把扁舟借我散髪滄浪滄浪逸詩五言絶句西山西山青縹緲深處有丹砂說道神仙客邀余戲紫霞送友歸山效應物體送君歸山谷覺我荷衣塵殷勤渭城别哀淚自沾巾空齋寒燈照疎竹栖禽時復驚黙坐空齋夜寂寂道心生五言八句歲暮得表叔吳景仙書因寄逰吳還適越慷慨莫徒然烽火關河隔兵戈宇宙連書來山雪外人在海雲邊借問遼東鶴歸來定幾年登天皇山作我來陟髙頂俯瞰臨長川隂崖隠落日疊嶂鳴飛泉獨立一世外所思千古前囘㸔鳥没處茫茫生白煙㳺紫芝巖羽客逍遥地花源世未尋我來窺異迹髙步越飛岑石帶藤蘿古泉鳴澗壑深紫芝未可采空寄白雲心七言絶句二首萬里長江歲暮天冰堅可渡不須船雪堂老子迎君笑化鶴歸來又百年梅花樹樹攪離心寒重駞裘雪片深詩思飛來驢子上小山叢桂伴君吟四言平冦上史君王潛齋治平改元有盜于建昔犯我鄙狼蹂豕踐於休吾侯維民之憂爰整我軍式遏䖍劉侯勵將士無譁聽我進退勇怯死生福禍侯出府庫㗖勳賞馘前無堅敵後無捷策乃有竒士據鞍請行袒裼入陣賊莫能嬰亦有賢僚爭先䟦涉屡摧賊鋒月奏三捷侯曰嘻哉盜本王臣殪而殱旃傷天地仁赤子弄兵如魚逰釜投戈歸田新汝生路孰謂反覆紿我行人既弛我備薄奄我軍我軍少却醜類鴟張環数百里奔播倉皇侯曰嗟哉其又可恕馳赤白囊亟請淮旅淮旅未來阽危如燬淮旅既來稚耋失喜侯謂淮將次舍良苦休士秣馬我有清酤淮將曰吁剪此朝食不介而馳直擣其穴群醜來聚亘野彌山淮旅整暇徐誘之前弓不虚彀矢不妄激發数步内應弦而踣或戈其喉或殳其脛若烏獲力鞭乳臭嬰黨類周章途殫命窄魚驚鳥散影不反迹淮旅拗怒蠆芥䯱髵捜林刮莽逺討窮追淮旅拗怒火烈具舉沸澤焦崖窟穴無所自相蹈藉十殺八九喪魄亡精食不知口原膏野赤谷臭川腥燐火不熖殤鬼殘形乃求元兇已縊巖阻執彼餘魁入而振旅其魁伊何緇服髠首一郡縱觀萬夫歡走炮烙剔腐以儆叛者前後獻俘復以百数蕩滌汙垢宥貸脅從収霜捲雹和氣融融侯饗淮將加籩折爼庖騎酒車飲均衆伍何以贈之筐篚熒煌戰功曰多告成于王嗟我婦子若翁若嫗安逸怡愉匪侯曷保侯曰此捷諸將之功雖有諸將實侯指踪讐在藩籬疾居心腹急緩安危若手反復匪侯勤請蔓實難圖謂予不信往有覆車君子作歌以頌侯績誰其采詩願備簡册滄浪集卷三
