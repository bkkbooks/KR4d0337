front:
  text: 御製題嚴羽滄浪集言志曾聞舜典宣爾時誰識所為禪假禪宗以定詩品混儒釋兼紊後先
  hash: sha256:4678d1ef724c13a468faa1b13b712436851d82e0ca0160428de26a0e9870fe82
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0337_WYG_000-1a, image: WYG1179/WYG1179-0027a.png}
body:
  text: 按嚴羽滄浪集詩辨以為禪道在妙悟詩道亦在妙悟且婁舉正法眼小乘禪臨濟曹洞之類以定詩品不惟引釋教以證儒宗已為冠履倒置比擬弗倫豈知佛生於周昭王時至漢明帝時始入中國其教亦惟演經守律而已至達摩於蕭梁時至中國始倡禪宗頓悟之法是虞廷所為詩言志者乃數典之最祖彼時之詩亦可以禪宗槩之乎夫詩有别裁偶涉禪趣固無不可若宋之蘇軾及我朝之張照每有吟咏託禪意者十之七八已失詩之本㫖若嚴羽此集津津以禪門乘果定詩之品格其所謂不涉理路不落言筌者羽早自犯涉理路而落言筌即禪家所謂擔板漢未必非此人也詩以闢之用示後之學詩者欽定四庫全書集部四滄浪集别集類三宋提要臣等謹按滄浪集二卷宋嚴羽撰羽字儀卿一字丹邱邵武人自號滄浪逋客與嚴仁嚴參齊名世號三嚴今仁與參詩集無傳惟羽集在其滄浪詩話有曰論詩如論禪漢魏晉與盛唐之詩則第一義也大厯以還之詩則小乘禪也晚唐之詩則聲聞辟支果也盛唐諸人惟在興趣羚羊挂角無迹可求故其妙處透徹玲瓏不可湊泊如空中之音相中之色水中之月鏡中之象言有盡而意無窮近代諸公乃作奇特解會以才學為詩以議論為詩夫豈不工終非古人之詩也云云其生平大旨具在于是考困學紀聞載唐戴叔倫詩謂詩家之景如藍田日暖良玉生煙可望而不可即司空圖詩品有不著一字盡得風流語其與李秀才書又有梅止于酸鹽止于鹹而味在酸鹹之外語蓋推闡叔倫之意羽之持論又源于圖特圖列二十四品不名一格羽則専主于妙逺故其所自為詩獨任性靈掃除美刺清音獨逺切響遂稀五言如一徑入松雪數峯生暮寒七言如空林木落長疑雨别浦風多欲上潮洞庭旅雁春歸盡瓜步寒潮夜落遲皆志在天寶以前而格實不能超大厯之上由其持詩有别才不關于學詩有别趣不關于理之說故止能摹王孟之餘響不能追李杜之巨觀也李東陽懷麓堂詩話曰嚴滄浪所論超羣軼俗真若有所自得反覆譬說未嘗有失顧其所自為作徒得唐人體面而亦少超拔警策之處豫嘗謂識得十分只做得八九分其一二分乃拘于才力其滄浪之謂乎云云是猶徒知其病未中其所以病矣其詩話一卷舊本别行此本為明正德中淮陽胡仲器所編置之詩集之前作第一卷意在標明宗㫖殊乖體例今惟以詩二卷著録别集類其詩話别入詩文評類以還其舊焉乾隆四十二年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書薈要集部四滄浪集目録别集類三宋卷一詩辨詩體詩法詩評詩證附答出繼叔臨安吳景仙書卷二五言絶句七言絶句五言八句七言八句古詩卷三楚詞操吟引謡歌行詞滄浪逸詩五言絶句五言八句七言絶句四言
